<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/health-api.js"></script>
    <script src="js/unified-nav.js"></script>
</head>

<body>
    <div class="container mx-auto p-8">
        <h1 class="text-2xl font-bold mb-4">Dashboard Test</h1>
        <div id="status" class="mb-4 p-4 bg-gray-100 rounded">
            <p>Checking dashboard functionality...</p>
        </div>
        <div id="user-info" class="mb-4 p-4 bg-blue-100 rounded hidden">
            <h2 class="font-bold">User Info:</h2>
            <p id="user-name">Loading...</p>
        </div>
        <div id="auth-status" class="mb-4 p-4 bg-green-100 rounded hidden">
            <h2 class="font-bold">Authentication Status:</h2>
            <p id="auth-message">Loading...</p>
        </div>
        <a href="dashboard.html" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
            Go to Dashboard
        </a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const statusDiv = document.getElementById('status');
            const userInfoDiv = document.getElementById('user-info');
            const authStatusDiv = document.getElementById('auth-status');

            // Check if unified navigation is working
            setTimeout(() => {
                if (typeof unifiedNav !== 'undefined') {
                    statusDiv.innerHTML = '<p class="text-green-600">✅ Unified Navigation loaded successfully</p>';

                    if (unifiedNav.currentUser) {
                        userInfoDiv.classList.remove('hidden');
                        document.getElementById('user-name').textContent = unifiedNav.currentUser.name || 'User';
                        authStatusDiv.classList.remove('hidden');
                        document.getElementById('auth-message').textContent = 'Authenticated via Unified Navigation';
                    } else {
                        authStatusDiv.classList.remove('hidden');
                        document.getElementById('auth-message').textContent = 'Not authenticated - redirecting to login';
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 2000);
                    }
                } else {
                    statusDiv.innerHTML = '<p class="text-red-600">❌ Unified Navigation failed to load</p>';
                }
            }, 1000);
        });
    </script>
</body>

</html>
